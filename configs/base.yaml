project:
  name: aiaa3201-project3
  seed: 42

paths:
  raw_data_dir: data/raw
  processed_data_dir: data/processed
  gt_data_dir: data/gt
  output_dir: outputs

preprocess:
  target_fps: 24
  target_width: 1280
  target_height: 720
  frame_format: png
  frame_name_template: frame_%06d

evaluation:
  jr_iou_threshold: 0.5
  allow_missing_gt: true
  save_visualization: true
  metric_schema_version: v2_remove_quality
  quality_weights:
    ros: 0.5
    tcf: 0.3
    bes: 0.2
  selection:
    exclude_datasets: []
    min_mean_mask_ratio_by_dataset:
      wild: 0.002
    min_active_frame_ratio_by_dataset:
      wild: 0.25
    enforce_if_candidate_available: true
  ros:
    backend_priority: [yolo, maskrcnn]
    device: cpu
  tcf:
    dilate_kernel: 5
  bes:
    dilate_kernel: 5
    erode_kernel: 3
    sobel_ksize: 3

output_policy:
  video_only: true
  write_h264_videos: true
  auto_cleanup_intermediates: true
  restored_video_name: restored_h264.mp4
  mask_video_name: mask_h264.mp4
  restored_h264:
    crf: 23
    preset: medium
    pix_fmt: yuv420p
  mask_h264:
    crf: 0
    preset: medium
    pix_fmt: gray
    threshold: 127
  cleanup:
    remove_candidate_root: true
    remove_frame_dirs: true
    remove_mask_dirs: true

part1:
  dynamic_classes:
    - person
    - bicycle
    - motorcycle
    - car
    - bus
    - truck
    - bird
    - cat
    - dog
    - horse
    - sheep
    - cow
    - elephant
    - bear
    - zebra
    - giraffe
    - antelope
  keep_unknown_motion_as_dynamic: true
  save_mp4: false
  defaults:
    flow_threshold: 1.2
    dilation_kernel: 7
    inpaint_method: telea
    temporal_window: 1
  segmentation:
    yolo_model: yolov8n-seg.pt
    yolo_conf_threshold: 0.25
    yolo_imgsz: 960
    maskrcnn_conf_threshold: 0.5
  flow:
    aggregation: median
    max_corners: 200
    quality_level: 0.01
    min_distance: 5
    block_size: 7
    win_size: [21, 21]
    max_level: 3
    criteria_count: 30
    criteria_eps: 0.01
  inpaint:
    radius: 3.0
  fallback:
    enable_wild_zero_mask_fallback: true
    diff_threshold_percentile: 97.5
    min_area_ratio: 0.000001
    morph_kernel: 5
  grids:
    flow_thresholds: [0.8, 1.2, 1.6]
    dilation_kernels: [3, 7, 11]
    inpaint_methods: [telea, ns]
    temporal_windows: [0, 1, 2]
  runtime:
    device: auto
    auto_install_missing: true

part2:
  phase1_reference_exp_id: phase1_fix_acceptance_20260323
  save_mp4: false
  models:
    sam2_repo: https://github.com/facebookresearch/sam2.git
    sam2_model_cfg: configs/sam2.1/sam2.1_hiera_t.yaml
    sam2_checkpoint: outputs/external/part2/checkpoints/sam2.1_hiera_tiny.pt
    trackanything_repo: https://github.com/gaomingqi/Track-Anything.git
    trackanything_sam_model_type: vit_h
    trackanything_mmcv_version: "2.2.0"
    trackanything_sam_checkpoint: outputs/external/part2/checkpoints/sam_vit_h_4b8939.pth
    trackanything_xmem_checkpoint: outputs/external/part2/checkpoints/XMem-s012.pth
    trackanything_e2fgvi_checkpoint: outputs/external/part2/checkpoints/E2FGVI-HQ-CVPR22.pth
  prompt:
    detector: yolo
    dynamic_classes:
      - person
      - bicycle
      - motorcycle
      - car
      - bus
      - truck
      - bird
      - cat
      - dog
      - horse
      - sheep
      - cow
      - elephant
      - bear
      - zebra
      - giraffe
      - antelope
    max_prompts: 3
  mask_post:
    refined_kernel: 5
    temporal_smooth_window: 1
  mask_fusion:
    enable_phase1_prior: true
    phase1_exp_id: ""
    skip_datasets: [wild]
    method: intersection
    per_frame_low_ratio: 0.000001
    empty_frame_fallback: phase1
    mean_min_ratio: 0.0001
    low_mean_fallback: phase1
  selection:
    exclude_datasets: []
  propainter:
    repo_url: https://github.com/sczhou/ProPainter.git
    balanced_profile:
      neighbor_length: 10
      ref_stride: 10
      subvideo_length: 40
      resize_ratio: 0.75
      mask_dilation: 4
      fp16: true
    degraded_profile:
      neighbor_length: 8
      ref_stride: 14
      subvideo_length: 28
      resize_ratio: 0.66
      mask_dilation: 4
      fp16: true
    profile_grid:
      - name: balanced_a
        neighbor_length: 10
        ref_stride: 10
        subvideo_length: 40
        resize_ratio: 0.75
        mask_dilation: 4
        fp16: true
      - name: balanced_b
        neighbor_length: 8
        ref_stride: 12
        subvideo_length: 36
        resize_ratio: 0.75
        mask_dilation: 4
        fp16: true
      - name: balanced_lowmem
        neighbor_length: 8
        ref_stride: 14
        subvideo_length: 28
        resize_ratio: 0.66
        mask_dilation: 4
        fp16: true
  fallback:
    enable_cv2_inpaint_fallback: true
    inpaint_method: ns
    inpaint_radius: 3.0
    temporal_window: 1
  runtime:
    device: auto
    auto_install_missing: true
    strict_dual_run: false

part3:
  references:
    a_best_alias: A-best
    b_best_alias: B-best
  selection:
    exclude_datasets: []
  e1:
    grid:
      - name: morph_identity
        opening_kernel: 1
        closing_kernel: 1
        dilation_kernel: 1
        smoothing_kernel: 0
      - name: morph_light
        opening_kernel: 3
        closing_kernel: 5
        dilation_kernel: 3
        smoothing_kernel: 0
      - name: morph_balanced
        opening_kernel: 3
        closing_kernel: 7
        dilation_kernel: 5
        smoothing_kernel: 3
      - name: morph_edge_safe
        opening_kernel: 5
        closing_kernel: 7
        dilation_kernel: 3
        smoothing_kernel: 3
  e2:
    temporal_windows: [0, 1, 2]
  e3:
    sam3:
      repo_url: https://github.com/facebookresearch/sam3.git
      model_cfg: ""
      checkpoint:
        local_path: outputs/external/part3/checkpoints/sam3.pt
        hf_repo_id: facebook/sam3
        hf_filename: ""
      hf_endpoint: https://huggingface.co
      skip_datasets: [wild]
      merge_with_input: or
      env_name: sam3
      auto_install: true
      permission_required: true
      prompt_text: ""
      prompt_text_by_dataset:
        bmx-trees: person riding a bicycle
        tennis: tennis player
      device: cuda
  runtime:
    device: auto
    auto_install_missing: true
    strict_sam3_permission: true

datasets:
  mandatory:
    wild:
      raw_video: data/raw/wild.mp4
      processed_frames_dir: data/processed/wild/frames
      gt_frames_dir: data/gt/wild/frames
    bmx-trees:
      raw_video: data/raw/bmx-trees.mp4
      processed_frames_dir: data/processed/bmx-trees/frames
      gt_frames_dir: data/gt/bmx-trees/frames
    tennis:
      raw_video: data/raw/tennis.mp4
      processed_frames_dir: data/processed/tennis/frames
      gt_frames_dir: data/gt/tennis/frames
  optional:
    davis:
      raw_video: data/raw/davis.mp4
      processed_frames_dir: data/processed/davis/frames
      gt_frames_dir: data/gt/davis/frames
