  - generic [ref=e171]:
    - heading "Key Experimental Findings" [level=2] [ref=e172]
    - generic [ref=e173]:
      - paragraph [ref=e174]:
        - strong [ref=e175]: A to B.
        - text: Track Anything + ProPainter gives a real but modest MaskScore gain over the classical baseline (+0.0168), driven by better JM and JR rather than by covering more pixels.
      - paragraph [ref=e176]:
        - strong [ref=e177]: Route E.
        - text: SAM 3 refinement improves GT coverage and yields the highest FAST-VQA, but it slightly lowers JM. The improvement is therefore not a simple across-the-board boundary improvement.
      - paragraph [ref=e178]:
        - strong [ref=e179]: Route F.
        - text: VGGT4D is useful as a prompt prior, not as a raw final mask. The accepted SAM 2 propagation route gives the largest single gain over B (+0.0460 MaskScore).
      - paragraph [ref=e180]:
        - strong [ref=e181]: Phase 6.
        - text: Adding SAM 3 after Route F barely changes the mask metrics (+0.0010 over F), showing diminishing returns after the VGGT4D-derived SAM 2 masks are already in place.
